<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a2235"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="bar" x1="120" y1="200" x2="392" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Tile background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#26304a" stroke-width="4"/>

  <!-- Dumbbell mark -->
  <g stroke="url(#bar)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- center bar -->
    <line x1="176" y1="256" x2="336" y2="256" stroke-width="34"/>
    <!-- inner plates -->
    <line x1="160" y1="196" x2="160" y2="316" stroke-width="40"/>
    <line x1="352" y1="196" x2="352" y2="316" stroke-width="40"/>
    <!-- outer plates -->
    <line x1="116" y1="216" x2="116" y2="296" stroke-width="40"/>
    <line x1="396" y1="216" x2="396" y2="296" stroke-width="40"/>
  </g>
</svg>
