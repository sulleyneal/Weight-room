name: Deploy to GitHub Pages

# Deploy from the repository's default branch (the github-pages environment is
# gated to it). This is currently the claude/* branch; if you make `main` the
# default in Settings → General, switch this trigger to `main`.
on:
  push:
    branches:
      - claude/gym-workout-tracker-qdincu
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Do NOT cancel an in-progress deploy — let it finish
# so a published build is never left half-applied (matches GitHub's Pages template).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
